config-schema-version: 2

mysql:
  host: 127.0.0.1
  port: 3306
  database: prismapractice
  username: prismapractice
  password: change-me
  parameters:
    sslMode: PREFERRED
    allowPublicKeyRetrieval: false
    serverTimezone: UTC
    characterEncoding: utf8
    useUnicode: true

pool:
  maximum-pool-size: 10
  minimum-idle: 2
  connection-timeout-ms: 5000
  validation-timeout-ms: 2000
  idle-timeout-ms: 600000
  max-lifetime-ms: 1740000
  keepalive-time-ms: 300000
  leak-detection-threshold-ms: 0

migrations:
  locations:
    - classpath:db/migration
  table: flyway_schema_history
  baseline-on-migrate: false
  validate-on-migrate: true
  clean-disabled: true
  fail-on-missing-locations: false

startup:
  test-query: SELECT 1

redis:
  enabled: true
  host: 127.0.0.1
  port: 6379
  database: 0
  username: ""
  password: ""
  client-name: prismapractice
  ssl:
    enabled: false
    verify-peer: true
  resources:
    io-thread-pool-size: 2
    computation-thread-pool-size: 2
  timeouts:
    connect-timeout-ms: 3000
    command-timeout-ms: 3000
  reconnect:
    initial-delay-ms: 250
    max-delay-ms: 5000
  pubsub:
    enabled: true
  keyspace:
    prefix: practice
    namespace: ""
  ttl:
    player-presence-ms: 45000
    social-cooldown-ms: 3000
    friend-request-ms: 300000
    duel-request-ms: 30000
    party-invite-ms: 60000
    transition-lock-ms: 15000
    matchmaking-lock-ms: 15000
    arena-lock-ms: 15000
